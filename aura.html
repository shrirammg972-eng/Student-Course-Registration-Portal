<!DOCTYPE html>
<html>
<head>
    <title>Student Registration</title>

    <style>
        body{
            font-family: Arial;
            background-color: lightblue;
        }

        h1,h2{
            text-align:center;
        }

        form{
            width:400px;
            margin:auto;
            background:white;
            padding:20px;
            border:1px solid black;
        }

        input,select,textarea{
            width:100%;
            padding:5px;
            margin-bottom:10px;
        }

        input[type="radio"],
        input[type="checkbox"]{
            width:auto;
        }

        button{
            padding:8px 15px;
        }

        button:hover{
            background:lightgreen;
        }

        table{
            width:90%;
            margin:20px auto;
            border-collapse:collapse;
        }

        table,th,td{
            border:1px solid black;
            padding:10px;
            text-align:center;
        }

        footer{
            text-align:center;
            margin-top:20px;
        }

        @media(max-width:600px){
            form{
                width:90%;
            }
        }
    </style>

</head>

<body>

<h1>ABC Training Institute</h1>

<h2>Student Registration Form</h2>

<form id="myForm">

<label>Full Name</label>
<input type="text" id="name">

<label>Email</label>
<input type="text" id="email">

<label>Mobile Number</label>
<input type="text" id="mobile">

<label>Gender</label>

<input type="radio" name="gender" value="Male"> Male
<input type="radio" name="gender" value="Female"> Female

<br><br>

<label>Department</label>
<input type="text" id="department">

<label>Course</label>

<select id="course">
    <option value="">Select Course</option>
    <option>Web Development</option>
    <option>Java</option>
    <option>Python</option>
    <option>AI</option>
</select>

<label>Skills</label><br>

<input type="checkbox" value="HTML"> HTML<br>

<input type="checkbox" value="CSS"> CSS<br>

<input type="checkbox" value="JavaScript"> JavaScript<br>

<input type="checkbox" value="Python"> Python

<br><br>

<label>Date of Birth</label>
<input type="date" id="dob">

<label>Address</label>
<textarea id="address" rows="4"></textarea>

<button type="submit">Submit</button>
<button type="reset">Reset</button>

</form>

<h2>Registered Students</h2>

<table id="table">

<tr>
    <th>Name</th>
    <th>Course</th>
    <th>Department</th>
    <th>Skills</th>
</tr>

</table>

<footer>
ABC Training Institute
</footer>

<script>

document.getElementById("myForm").onsubmit=function(e){

    e.preventDefault();

    var name=document.getElementById("name").value;
    var email=document.getElementById("email").value;
    var mobile=document.getElementById("mobile").value;
    var department=document.getElementById("department").value;
    var course=document.getElementById("course").value;
    var dob=document.getElementById("dob").value;

    if(name=="" || email=="" || mobile=="" || department=="" || course=="" || dob==""){

        alert("Please fill all fields");
        return;

    }

    if(email.indexOf("@")==-1 || email.indexOf(".")==-1){

        alert("Invalid Email");
        return;

    }

    if(mobile.length!=10 || isNaN(mobile)){

        alert("Enter 10 digit mobile number");
        return;

    }

    var age=new Date().getFullYear()-new Date(dob).getFullYear();

    if(age<18){

        alert("Age must be greater than 18");
        return;

    }

    var skills="";

    var checks=document.querySelectorAll("input[type='checkbox']:checked");

    checks.forEach(function(box){

        skills += box.value + " ";

    });

    var table=document.getElementById("table");

    var row=table.insertRow();

    row.insertCell(0).innerHTML=name;
    row.insertCell(1).innerHTML=course;
    row.insertCell(2).innerHTML=department;
    row.insertCell(3).innerHTML=skills;

    alert("Registration Successful");

    document.getElementById("myForm").reset();

}

</script>

</body>
</html>
